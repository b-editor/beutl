app-id: net.beditor.Beutl
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: beutl

finish-args:
  # --socket=wayland / --socket=fallback-x11 / --device=dri: display + GPU access for
  # Avalonia/Skia rendering.
  # --share=ipc: required by the X11 MIT-SHM extension (used when falling back to X11)
  # for efficient frame transfer; also recommended by Flatpak docs for GUI apps.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Audio playback during preview/export (PulseAudio/PipeWire via the pulse socket).
  - --socket=pulseaudio
  # Network for the Beutl API client (extension/package manager, update check, telemetry exporter).
  - --share=network
  # Project files and media imports/exports via XDG user dirs.
  # Prefer these over --filesystem=home so dotfiles (~/.ssh, ~/.gnupg, browser profiles, etc.) stay sandboxed.
  - --filesystem=xdg-documents
  - --filesystem=xdg-desktop
  - --filesystem=xdg-videos
  - --filesystem=xdg-pictures
  - --filesystem=xdg-music
  - --filesystem=xdg-download
  # External drives and user-mounted volumes (USB, NAS, etc.) used for source media.
  - --filesystem=/run/media
  - --filesystem=/media
  - --filesystem=/mnt
  # Read-only access to user fontconfig config and user-installed font directories,
  # so the host's fonts and fontconfig customizations are visible inside the sandbox.
  - --filesystem=xdg-config/fontconfig:ro
  - --filesystem=xdg-data/fonts:ro
  # ~/.fonts is the legacy location (freedesktop.org now prefers ~/.local/share/fonts);
  # kept for users with older font setups.
  - --filesystem=~/.fonts:ro
  # libnotify toasts emitted by NotificationService.
  - --talk-name=org.freedesktop.Notifications

# No top-level cleanup: this manifest does not build native dependencies, it only
# copies the prebuilt self-contained .NET output. Glob patterns like '*.a' would risk
# matching prebuilt static libraries shipped under runtimes/*/native/, and the directory
# rules (/include, /lib/pkgconfig, /man, ...) would all be no-ops because nothing is
# generated there.

modules:
  - name: beutl
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/beutl
      - cp -r beutl-bin/. /app/lib/beutl/
      - chmod +x /app/lib/beutl/Beutl
      - chmod +x /app/lib/beutl/Beutl.ExceptionHandler
      - chmod +x /app/lib/beutl/Beutl.PackageTools.UI
      - chmod +x /app/lib/beutl/Beutl.WaitingDialog
      - chmod +x /app/lib/beutl/Beutl.FFmpegWorker
      - install -Dm755 beutl-launcher.sh /app/bin/beutl
      - install -Dm644 net.beditor.Beutl.desktop /app/share/applications/net.beditor.Beutl.desktop
      - install -Dm644 net.beditor.Beutl.metainfo.xml /app/share/metainfo/net.beditor.Beutl.metainfo.xml
      - install -Dm644 net.beditor.Beutl.svg /app/share/icons/hicolor/scalable/apps/net.beditor.Beutl.svg
    sources:
      - type: dir
        path: sources/Beutl-linux-x64-standalone
        dest: beutl-bin
      - type: file
        path: beutl-launcher.sh
      - type: file
        path: net.beditor.Beutl.desktop
      - type: file
        path: net.beditor.Beutl.metainfo.xml
      - type: file
        path: net.beditor.Beutl.svg
