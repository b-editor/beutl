name: Format check

on:
  pull_request:
    branches: [ main ]

jobs:
  dotnet-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run dotnet format
        run: dotnet format Beutl.slnx --verbosity diagnostic

      - name: Check for formatting changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Formatting issues detected. Please run 'dotnet format' locally and commit the changes."
            git diff --stat
            echo "Showing first 200 lines of formatting diff (truncated):"
            git diff | head -n 200
            exit 1
          fi
