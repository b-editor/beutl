name: Format check

on:
  pull_request:
    branches: [ main ]

jobs:
  csharpier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run CSharpier
        run: dotnet csharpier check .

      - name: Report formatting issues
        if: failure()
        run: echo "::error::Formatting issues detected. Please run 'dotnet csharpier format .' locally and commit the changes."
