name: Translate Release Notes

on:
  workflow_dispatch:
    inputs:
      discussion_number:
        description: "Discussion number"
        required: true
        type: string
      discussion_node_id:
        description: "Discussion GraphQL node id"
        required: true
        type: string
      discussion_title:
        description: "Discussion title (used as the release tag)"
        required: true
        type: string
      discussion_html_url:
        description: "Discussion HTML URL"
        required: true
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Translate discussion and link from release
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.DISCUSSION_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.DISCUSSION_TOKEN }}
          allowed_bots: "github-actions"
          claude_args: '--allowed-tools "Bash(gh release view:*),Bash(gh release edit:*),Bash(gh api graphql:*),Bash(cat:*),Bash(mktemp:*),Bash(printf:*),Bash(jq:*),Write,Read"'
          prompt: |
            A new GitHub Discussion was created in `${{ github.repository }}`. Treat its title as a release tag and:
              1. translate the matching release body into Japanese and post it as a NEW COMMENT on the discussion (do not edit the discussion body itself), and
              2. prepend a Japanese link to that release's body so users can find the translation.

            ## Discussion context (passed via workflow_dispatch inputs)
            - number: `${{ inputs.discussion_number }}`
            - node_id: `${{ inputs.discussion_node_id }}`
            - title (use as release tag): `${{ inputs.discussion_title }}`
            - url: `${{ inputs.discussion_html_url }}`

            ## Steps

            1. Use the discussion title verbatim as the release tag (e.g. `v2.0.0-preview.3`). Fetch the release body:
               `gh release view "${{ inputs.discussion_title }}" -R ${{ github.repository }} --json body,tagName,isDraft,url`
               If the release does not exist, exit cleanly with a message вЂ” do not modify anything.

            2. Translate the release body into natural Japanese:
               - Keep all markdown structure (headings, bullets, nesting, `<details>`/`<summary>`, code spans, links) intact.
               - Translate human-readable text including section headings:
                 - `## What's Changed` в†’ `## е¤‰ж›ґз‚№`
                 - `**New Features**` в†’ `**ж–°ж©џиѓЅ**`
                 - `**Improvements & Refactoring**` в†’ `**ж”№е–„гѓ»гѓЄгѓ•г‚Ўг‚Їг‚їгѓЄгѓіг‚°**`
                 - `**Bug Fixes**` в†’ `**гѓђг‚°дї®ж­Ј**`
                 - `**Other**` в†’ `**гЃќгЃ®д»–**`
                 - Download link labels: `Installer` в†’ `г‚¤гѓіг‚№гѓ€гѓјгѓ©гѓј`, `Installer (.NET Runtime required)` в†’ `г‚¤гѓіг‚№гѓ€гѓјгѓ©гѓј (.NET Runtime еї…й €)`, `Zip (arm64)` / `Zip (x64)` гЃЇгЃќгЃ®гЃѕгЃѕгЂЃ`Debian package` в†’ `Debian гѓ‘гѓѓг‚±гѓјг‚ё`, `Zip (.NET Runtime required)` в†’ `Zip (.NET Runtime еї…й €)`.
               - Inside the `<details><summary>Changelog</summary>` block, keep the auto-generated `* <prefix>: ... by @user in <PR-URL>` lines untranslated (they are PR titles).
               - Translate the `**Full Changelog**` line label to `**гѓ•гѓ«гѓЃг‚§гѓіг‚ёгѓ­г‚°**` but keep the URL.
               - Do not add or remove sections.

            3. Check whether a Japanese-translation comment already exists on this discussion (to keep step 4 idempotent and to support repairing a previous half-completed run):
               ```
               gh api graphql -F number=${{ inputs.discussion_number }} -F owner='${{ github.repository_owner }}' -F repo='${{ github.event.repository.name }}' -f query='
                 query($owner: String!, $repo: String!, $number: Int!) {
                   repository(owner: $owner, name: $repo) {
                     discussion(number: $number) { comments(first: 50) { nodes { id url body } } }
                   }
                 }'
               ```
               Find the first comment whose body contains the marker line `<!-- japanese-release-notes -->`. Define `COMMENT_URL`:
                 - If such a comment exists, set `COMMENT_URL` to its `url`. Skip step 4 вЂ” do NOT post another comment.
                 - Otherwise, leave `COMMENT_URL` unset and proceed to step 4 to create the comment.

               In either case, ALWAYS continue to step 5 вЂ” a previous run may have posted the comment but failed to update the release body, and step 5 must be allowed to repair that.

            4. (Only if `COMMENT_URL` was not set in step 3.) Post the translated body as a NEW comment on the discussion. Create the comment body with the `Write` tool вЂ” write it to `comment-body.md` (it contains backticks, quotes, and newlines, so do NOT build it with shell heredocs / `echo` / `printf`) and prepend the marker line `<!-- japanese-release-notes -->` followed by a blank line so future runs can detect it. Then:
               ```
               gh api graphql -F discussionId='${{ inputs.discussion_node_id }}' -F body=@comment-body.md -f query='
                 mutation($discussionId: ID!, $body: String!) {
                   addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                     comment { id url }
                   }
                 }'
               ```
               (Use `-F body=@<file>` so the file contents are sent as the variable value.)
               Set `COMMENT_URL` to the returned `comment.url` (e.g. `https://github.com/<owner>/<repo>/discussions/<n>#discussioncomment-<id>`).
               Do NOT modify the discussion body itself вЂ” only add a comment.

            5. If the release body does NOT already contain the substring `ж—Ґжњ¬иЄћгЃ®гѓЄгѓЄгѓјг‚№гѓЋгѓјгѓ€гЃЇ`, prepend exactly this paragraph (followed by one blank line) to the existing release body, using `COMMENT_URL` from step 3 or step 4:
               ```
               ж—Ґжњ¬иЄћгЃ®гѓЄгѓЄгѓјг‚№гѓЋгѓјгѓ€гЃЇ[гЃ“гЃЎг‚‰](<COMMENT_URL>)гЃ§гЃ™гЂ‚
               ```
               Then create the combined body with the `Write` tool вЂ” write it to `release-body.md` (not a shell heredoc) and run:
               `gh release edit "${{ inputs.discussion_title }}" -R ${{ github.repository }} --notes-file release-body.md`
               Preserve `--draft=true` if the release was a draft (use the `isDraft` value you fetched).
               If the substring is already present, do not edit the release.

            ## Constraints

            - Do not edit the discussion body, title, or category вЂ” only ADD a comment.
            - Do not publish the release, edit the tag, or touch assets.
            - Do not modify any other discussion or release.
            - If anything is ambiguous (release missing, translation refused, API error), exit without partial writes.

      - name: Verify the translation link was added
        env:
          GH_TOKEN: ${{ secrets.DISCUSSION_TOKEN }}
          TAG: ${{ inputs.discussion_title }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" -R "$REPO" --json url >/dev/null 2>&1; then
            echo "No release found for $TAG вЂ” nothing to translate, skipping verification."
            exit 0
          fi
          body=$(gh release view "$TAG" -R "$REPO" --json body -q .body)
          if printf '%s' "$body" | grep -qF "ж—Ґжњ¬иЄћгЃ®гѓЄгѓЄгѓјг‚№гѓЋгѓјгѓ€гЃЇ"; then
            echo "Release notes link to the Japanese translation вЂ” translation succeeded."
          else
            echo "::error::Release $TAG exists but its notes do not link to the Japanese translation. The Claude step finished without updating the release body."
            exit 1
          fi
